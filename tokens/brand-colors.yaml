# ==============================================================================
# BRAND COLOR PALETTE
# ==============================================================================
#
# These colors are ADDITIVE. They do NOT replace any shadcn/ui semantic tokens.
# Use them ONLY when a design explicitly calls for brand-specific color treatment.
#
# Default UI (buttons, inputs, cards, text) → always use shadcn tokens.
# Brand treatments (hero sections, badges, marketing, illustrations) → use these.
# ==============================================================================

surfaces:
  light_background:
    hex: "#F4F4FA"
    css_var: "--brand-surface"
    context: "light theme"
    use: "Page-level background when design calls for brand surface instead of shadcn --background"

  light_grey:
    hex: "#E4E4EE"
    css_var: "--brand-surface-grey"
    context: "light theme"
    use: "Subtle section dividers, secondary cards, visual separation on light backgrounds"

  blue_background:
    hex: "#3A4BBA"
    css_var: "--brand-surface-blue"
    context: "blue mode (marketing, hero, branded sections)"
    use: "Full-bleed brand sections, hero backgrounds, marketing pages with blue treatment"

  dark_background:
    hex: "#101228"
    css_var: "--brand-surface"
    context: "dark theme"
    use: "Page-level background when design calls for brand surface instead of shadcn --background"

highlights:
  blue:
    hex: "#4D5EC0"
    css_var: "--brand-highlight-blue"
    context: "light and dark modes — on light, dark, and neutral surfaces"
    use: "Primary brand accent, interactive highlights, CTAs, badges, status indicators"

  navy:
    hex: "#1C2155"
    css_var: "--brand-highlight-navy"
    context: "light and blue modes — on light and blue surfaces"
    use: "Deep brand anchor, text on light surfaces, strong emphasis, dark badges"

  light:
    hex: "#EEEEFF"
    css_var: "--brand-highlight-light"
    context: "dark and blue modes — on dark and blue surfaces only"
    use: "Near-white tint for text, soft highlights, and card accents on dark/blue backgrounds"

offsets:
  lavender:
    hex: "#9C91C8"
    css_var: "--brand-offset-lavender"
    context: "all modes"
    use: "Secondary accent, decorative elements, category tags, subtle brand tints"

  green:
    hex: "#8DC540"
    css_var: "--brand-offset-green"
    context: "all modes"
    use: "Positive/success-adjacent emphasis, growth indicators, complementary accent"

  yellow:
    hex: "#F3C438"
    css_var: "--brand-offset-yellow"
    context: "all modes"
    use: "Warning-adjacent emphasis, attention, star ratings, highlight callouts"

  coral:
    hex: "#E05840"
    css_var: "--brand-offset-coral"
    context: "all modes"
    use: "Energetic accent, notification badges, heat indicators — not for errors (use --destructive)"

# ==============================================================================
# COLOR USAGE PHILOSOPHY
# ==============================================================================
# Keep it minimal. The UI should be mostly neutral.
#
# Tier 1 — Neutrals (default):
#   --foreground, --muted-foreground, --border, --background, surfaces, greys.
#   Use for the vast majority of UI.
#
# Tier 2 — Brand highlights (purposeful):
#   --brand-highlight-blue / --brand-highlight-navy / --brand-highlight-light.
#   May be decorative (avatars, badges, accents) but must still serve a purpose.
#   Don't scatter brand color without intent.
#
# Tier 3 — Offset accents (sparing):
#   --brand-offset-* colors. Use one per composition maximum.
#   Each must earn its place — never two offsets competing in the same section.
#
# Tier 4 — Non-brand colors (functional only):
#   --destructive (red), etc. Only when the color itself conveys meaning
#   (errors, warnings, overdue). Never purely decorative.
# ==============================================================================

# ==============================================================================
# USAGE RULES
# ==============================================================================

when_to_use:
  - "Hero sections and marketing pages — brand highlights on headings or CTAs"
  - "Status badges and tags — highlight colors for special emphasis"
  - "Illustrated content — brand palette for custom illustrations or icons"
  - "Custom branded backgrounds — use --brand-surface-* variants"
  - "Avatars, branded accents — decorative but purposeful identity touches"
  - "Gradient accents using brand blue / navy pair"
  - "Any element the design explicitly marks as 'brand colored'"

when_NOT_to_use:
  - "Standard UI components (buttons, inputs, cards) — use shadcn defaults"
  - "Body text — use --foreground / --muted-foreground"
  - "Borders and dividers — use --border"
  - "Error states — use --destructive"
  - "Focus rings — use --ring"
  - "Functional indicators where color conveys status (e.g. priority levels) — use neutrals"
  - "Any UI element not explicitly marked as 'brand colored' in the design"
  - "--brand-highlight-light on light backgrounds (insufficient contrast)"
  - "--brand-highlight-navy on dark backgrounds (insufficient contrast)"
  - "Two offset colors in the same visual section"
